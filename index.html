<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="container">
      <h1 class="logo">Semban Thennai</h1>

          <li><a href="#contact">Contact</a></li>

      <h2 class="section-title">Contact</h2>
