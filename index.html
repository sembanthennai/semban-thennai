<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semban Thennai</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

</head>
<body>

<!-- FLOATING CART -->
<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cart-panel">
<h2>Your Cart</h2>
<ul id="cart-items"></ul>
<button onclick="sendToWhatsApp()" class="btn-main">Order via WhatsApp</button>
</div>

<!-- PRODUCTS -->
<section class="container">
<h2>Our Products</h2>

<div class="product-grid">

<div class="product-card">
<img src="oil.jpg">
<h3>Coconut Oil</h3>
<button onclick="addToCart('Coconut Oil')" class="btn-main">Add</button>
</div>

<div class="product-card">
<img src="saplings.jpg">
<h3>Saplings</h3>
<button onclick="addToCart('Saplings')" class="btn-main">Add</button>
</div>

<div class="product-card">
<img src="coconut.jpg">
<h3>Fresh Coconuts</h3>
<button onclick="addToCart('Fresh Coconuts')" class="btn-main">Add</button>
</div>

</div>
</section>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(item) {
    let existing = cart.find(i => i.name === item);

    if (existing) {
        existing.qty++;
    } else {
        cart.push({ name: item, qty: 1 });
    }

    saveCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    saveCart();
}

function changeQty(index, change) {
    cart[index].qty += change;

    if (cart[index].qty <= 0) {
        removeItem(index);
    }

    saveCart();
}

function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function displayCart() {
    let list = document.getElementById("cart-items");
    let count = document.getElementById("cart-count");

    list.innerHTML = "";
    count.innerText = cart.length;

    cart.forEach((item, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
        ${item.name}
        <div>
            <button onclick="changeQty(${index}, -1)">-</button>
            ${item.qty}
            <button onclick="changeQty(${index}, 1)">+</button>
            <button onclick="removeItem(${index})">❌</button>
        </div>
        `;

        list.appendChild(li);
    });
}

function toggleCart() {
    let panel = document.getElementById("cart-panel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function sendToWhatsApp() {

    if (cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    let message = "Hello, I want to order:\n";

    // ONLY ITEM NAMES (no quantity)
    cart.forEach(item => {
        message += "- " + item.name + "\n";
    });

    let url = "https://wa.me/919842717277?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
}

displayCart();

</script>

</body>
</html>
